<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>進階分帳系統 (自動存檔版)</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 1.5rem; background-color: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: left; }
        .btn-clear { background: #dc3545; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>💰 分帳紀錄 (自動存檔)</h2>
        <input type="text" id="names" placeholder="參與者 (如: 小明, 小華, 小美)">
        <hr>
        <input type="date" id="date">
        <input type="text" id="payerName" placeholder="墊款人">
        <input type="number" id="amount" placeholder="金額">
        <input type="text" id="note" placeholder="備註">
        <button onclick="addRecord()">新增紀錄</button>
    </div>

    <div class="card">
        <h3>支出清單</h3>
        <table id="recordTable">
            <thead><tr><th>日期</th><th>墊款人</th><th>項目</th><th>金額</th></tr></thead>
            <tbody id="logBody"></tbody>
        </table>
        <button class="btn-clear" onclick="clearData()">清除所有資料</button>
        <button onclick="calculateFinal()" style="background:#007bff; margin-top:10px;">計算最終結算</button>
    </div>

    <div id="resultArea"></div>

    <script>
        let records = JSON.parse(localStorage.getItem('billRecords')) || [];
        document.getElementById('date').valueAsDate = new Date();

        // 頁面載入時自動讀取並顯示表格
        window.onload = renderTable;

        function renderTable() {
            const tbody = document.getElementById('logBody');
            tbody.innerHTML = "";
            records.forEach(r => {
                tbody.innerHTML += `<tr><td>${r.date}</td><td>${r.payer}</td><td>${r.note}</td><td>$${r.amount}</td></tr>`;
            });
            document.getElementById('names').value = localStorage.getItem('participants') || "";
        }

        function addRecord() {
            const date = document.getElementById('date').value;
            const payer = document.getElementById('payerName').value.trim();
            const amount = parseFloat(document.getElementById('amount').value);
            const note = document.getElementById('note').value.trim();
            const names = document.getElementById('names').value;

            if (!payer || isNaN(amount)) return alert("請填寫姓名與金額");

            records.push({ date, payer, amount, note });
            localStorage.setItem('billRecords', JSON.stringify(records));
            localStorage.setItem('participants', names);
            
            renderTable();
        }

        function clearData() {
            if(confirm("確定要清除所有紀錄嗎？")) {
                localStorage.clear();
                records = [];
                location.reload();
            }
        }

        // calculateFinal 邏輯保持不變 (請參考前一段程式碼中的邏輯)
        function calculateFinal() {
            const nameInput = document.getElementById('names').value;
            let participants = nameInput.split(/[,，\s]+/).filter(n => n);
            let totalSpent = records.reduce((sum, r) => sum + r.amount, 0);
            let share = totalSpent / participants.length;
            
            let netValues = {};
            participants.forEach(p => netValues[p] = -share);
            records.forEach(r => {
                if (netValues.hasOwnProperty(r.payer)) netValues[r.payer] += r.amount;
                else netValues[r.payer] = r.amount - share;
            });

            let debtors = Object.keys(netValues).filter(p => netValues[p] < -0.01).map(p => ({name: p, amt: -netValues[p]}));
            let creditors = Object.keys(netValues).filter(p => netValues[p] > 0.01).map(p => ({name: p, amt: netValues[p]}));

            let html = `<div class="card"><h3>結算結果</h3>`;
            debtors.forEach(d => {
                creditors.forEach(c => {
                    if (d.amt <= 0) return;
                    let pay = Math.min(d.amt, c.amt);
                    html += `<p><b>${d.name}</b> 給 <b>${c.name}</b>: $${pay.toFixed(2)}</p>`;
                    d.amt -= pay; c.amt -= pay;
                });
            });
            document.getElementById('resultArea').innerHTML = html + `</div>`;
        }
    </script>
</body>
</html>
