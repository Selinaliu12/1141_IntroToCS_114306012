<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政大生活助手 🐾</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --open: #2ecc71; --closed: #e74c3c; --primary: #34495e; --accent: #3498db; --bg: #f5f7f9; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: #f0f2f5; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .dashboard { width: 100%; max-width: 500px; padding-bottom: 50px; }
        
        .clock-box { text-align: center; margin-bottom: 15px; background: white; padding: 12px; border-radius: 15px; color: var(--primary); font-weight: bold; font-size: 1.2rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); cursor: pointer; border-left: 8px solid #ccc; transition: 0.3s; }
        .card.is-open { border-left-color: var(--open); }
        .card.is-closed { border-left-color: var(--closed); }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .name { font-size: 1.05rem; font-weight: 800; color: var(--primary); }
        .status-badge { padding: 4px 10px; border-radius: 50px; color: white; font-size: 0.7rem; font-weight: bold; }
        
        .info-row { margin-top: 5px; font-size: 0.9rem; color: #7f8c8d; }
        .today-range { font-size: 0.85rem; color: var(--accent); font-weight: bold; margin-top: 5px; border-top: 1px dashed #eee; padding-top: 5px; }
        
        .details { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.4s ease; }
        .card.active .details { max-height: 800px; opacity: 1; margin-top: 10px; }
        
        .btn { border: none; padding: 10px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .btn-start { background: #3498db; color: white; }
        .btn-end { background: #e67e22; color: white; }

        .add-custom { background: #f9f9f9; border: 2px dashed #ddd; padding: 15px; border-radius: 15px; margin-top: 15px; text-align: center; }
        input { padding: 8px; border-radius: 8px; border: 1px solid #ddd; margin: 5px 0; width: 85%; }

        .stats-section { width: 100%; background: #fff; border-radius: 15px; padding: 15px; margin-top: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); box-sizing: border-box; }
        .chart-container { height: 200px; position: relative; }

        .log-section { width: 100%; background: #fff; border-radius: 15px; padding: 15px; margin-top: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); box-sizing: border-box; }
        .log-item { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 0.85rem; position: relative; }
        .btn-del-log { position: absolute; right: 0; top: 10px; background: none; border: none; color: #ccc; cursor: pointer; }
        .btn-del-log:hover { color: #e74c3c; }
        .btn-export { background: #34495e; color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="clock-box" id="clock">🕰️ 初始化中...</div>
    
    <div id="container"></div>

    <div class="add-custom">
        <div style="font-weight:bold; color:#666; margin-bottom:5px;">➕ 新增自訂地點 (如: 宿舍、某教室)</div>
        <input type="text" id="c-name" placeholder="地點名稱">
        <input type="text" id="c-time" placeholder="時段 (範例: 08:00-22:00)">
        <button onclick="addCustomPlace()" style="background:#2ecc71; color:white; border:none; padding:8px 20px; border-radius:8px; cursor:pointer; font-weight:bold; margin-top:5px;">新增卡片</button>
    </div>

    <div id="stats-area" class="stats-section" style="display:none;">
        <div style="font-weight:bold; margin-bottom:10px;">📊 複盤統計 (時數佔比)</div>
        <div class="chart-container"><canvas id="myChart"></canvas></div>
    </div>

    <div class="log-section">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <span style="font-weight:bold;">📅 我的足跡</span>
            <button class="btn-export" onclick="exportCSV()">📤 匯出 CSV</button>
        </div>
        <div id="log-list"></div>
    </div>
</div>

<script>
    const defaultData = [
        { name: "底圖", icon: "🐾", rules: { weekday: ["00:00", "24:00"], sat: ["00:00", "24:00"], sun: ["00:00", "24:00"] }, is24H: true },
        { name: "中正圖書館", icon: "📚", rules: { weekday: ["08:00", "21:45"], sat: ["08:00", "21:45"], sun: ["08:00", "21:45"] } },
        { name: "達賢圖書館", icon: "🌲", rules: { weekday: ["08:00", "21:45"], sat: ["08:00", "21:45"], sun: ["08:00", "21:45"] } },
        { name: "商圖 / 綜圖分館", icon: "📈", rules: { weekday: ["08:00", "21:45"], sat: ["10:00", "21:45"], sun: null } },
        { name: "健身房", icon: "🏋️‍♂️", rules: { weekday: ["12:00", "21:00"], sat: ["09:00", "17:00"], sun: ["09:00", "17:00"] }, special: "1stMon" },
        { name: "游泳館", icon: "🏊", rules: { weekday: ["06:00", "20:00"], sat: ["06:00", "18:00"], sun: ["06:00", "18:00"] }, special: "1stMon" }
    ];

    let chartInstance = null;

    function checkStatus() {
        try {
            const now = new Date();
            const day = now.getDay(), date = now.getDate();
            const timeVal = now.getHours() * 100 + now.getMinutes();
            document.getElementById('clock').innerText = "🕰️ " + now.toLocaleTimeString('zh-TW', { hour12: false });

            const customPlaces = JSON.parse(localStorage.getItem('nccu_custom_v36') || '[]');
            const allPlaces = [...defaultData, ...customPlaces];

            allPlaces.forEach((item, index) => {
                const card = document.getElementById(`card-${index}`);
                if (!card) return;
                let schedule = (day === 0) ? item.rules.sun : (day === 6 ? item.rules.sat : item.rules.weekday);
                let isOpen = item.is24H || false, cOpen = schedule ? schedule[0] : "", cClose = schedule ? schedule[schedule.length - 1] : "";

                if (day === 1 && date <= 7 && item.special === "1stMon") {
                    if (item.name === "健身房") cOpen = "14:00";
                    if (item.name === "游泳館") cOpen = "12:00";
                }

                if (!item.is24H && schedule) {
                    const s = parseInt(cOpen.replace(':','')), e = parseInt(cClose.replace(':',''));
                    if (timeVal >= s && timeVal < e) isOpen = true;
                }

                card.classList.toggle('is-open', isOpen);
                card.classList.toggle('is-closed', !isOpen);
                card.querySelector('.status-badge').innerText = isOpen ? '開放中' : '已關閉';
                card.querySelector('.status-badge').style.backgroundColor = isOpen ? 'var(--open)' : 'var(--closed)';
                card.querySelector('.info-row').innerText = isOpen ? "🟢 目前開館中" : (schedule ? "💤 目前休館" : "❌ 今日不開放");
                card.querySelector('.today-range').innerText = schedule ? `今日時段：${cOpen} - ${cClose}` : "今日時段：全日休館";
            });
        } catch (e) { console.error(e); }
    }

    function renderButtons() {
        const ongoing = JSON.parse(localStorage.getItem('ongoing_v36'));
        const allPlaces = [...defaultData, ...JSON.parse(localStorage.getItem('nccu_custom_v36') || '[]')];
        allPlaces.forEach((_, i) => {
            const ctx = document.getElementById(`btn-ctx-${i}`);
            if (!ctx) return;
            ctx.innerHTML = (ongoing && ongoing.index === i) 
                ? `<button class="btn btn-end" onclick="event.stopPropagation(); endCheckin()">🛑 結束並記錄</button>`
                : `<button class="btn btn-start" ${ongoing ? 'disabled' : ''} onclick="event.stopPropagation(); startCheckin(${i})">📍 開始打卡</button>`;
        });
    }

    function startCheckin(index) {
        localStorage.setItem('ongoing_v36', JSON.stringify({ index, start: Date.now() }));
        renderButtons();
    }

    function endCheckin() {
        const ongoing = JSON.parse(localStorage.getItem('ongoing_v36'));
        const allPlaces = [...defaultData, ...JSON.parse(localStorage.getItem('nccu_custom_v36') || '[]')];
        const item = allPlaces[ongoing.index];
        const duration = Math.round((Date.now() - ongoing.start) / 60000);
        const note = prompt(`結束！在 ${item.name} 待了 ${duration} 分鐘。記點筆記？`, "");
        
        const logs = JSON.parse(localStorage.getItem('nccu_logs_v36') || '[]');
        logs.unshift({ id: Date.now(), name: item.name, duration, note: note || "", date: new Date().toLocaleDateString(), rawTime: `${new Date(ongoing.start).getHours()}:${new Date(ongoing.start).getMinutes()} - ${new Date().getHours()}:${new Date().getMinutes()}` });
        localStorage.setItem('nccu_logs_v36', JSON.stringify(logs));
        localStorage.removeItem('ongoing_v36');
        
        renderButtons(); renderLogs(); updateStats();
    }

    function updateStats() {
        const logs = JSON.parse(localStorage.getItem('nccu_logs_v36') || '[]');
        if (logs.length < 1) return;
        document.getElementById('stats-area').style.display = 'block';
        const stats = {};
        logs.forEach(l => stats[l.name] = (stats[l.name] || 0) + l.duration);
        const ctx = document.getElementById('myChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: Object.keys(stats), datasets: [{ data: Object.values(stats), backgroundColor: ['#3498db', '#e74c3c', '#2ecc71', '#f1c40f', '#9b59b6', '#e67e22'] }] },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    function addCustomPlace() {
        const name = document.getElementById('c-name').value;
        const time = document.getElementById('c-time').value || "00:00-24:00";
        if (!name) return alert("請輸入名稱");
        const custom = JSON.parse(localStorage.getItem('nccu_custom_v36') || '[]');
        const t = time.split('-');
        custom.push({ name, icon: "📍", rules: { weekday: t, sat: t, sun: t }, is24H: time === "00:00-24:00" });
        localStorage.setItem('nccu_custom_v36', JSON.stringify(custom));
        location.reload();
    }

    function deleteLog(id) {
        if(!confirm("確定刪除？")) return;
        let logs = JSON.parse(localStorage.getItem('nccu_logs_v36') || '[]');
        logs = logs.filter(l => l.id !== id);
        localStorage.setItem('nccu_logs_v36', JSON.stringify(logs));
        renderLogs(); updateStats();
    }

    function editLog(id) {
        let logs = JSON.parse(localStorage.getItem('nccu_logs_v36') || '[]');
        let log = logs.find(l => l.id === id);
        const newDuration = prompt("修改時長(分鐘):", log.duration);
        const newNote = prompt("修改筆記:", log.note);
        if(newDuration) log.duration = parseInt(newDuration);
        if(newNote !== null) log.note = newNote;
        localStorage.setItem('nccu_logs_v36', JSON.stringify(logs));
        renderLogs(); updateStats();
    }

    function exportCSV() {
        const logs = JSON.parse(localStorage.getItem('nccu_logs_v36') || '[]');
        let csv = "\uFEFF日期,時間段,場館,時長(分),筆記\n";
        logs.forEach(l => csv += `${l.date},${l.rawTime},${l.name},${l.duration},"${l.note}"\n`);
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "政大生活複盤.csv"; a.click();
    }

    function renderLogs() {
        const logs = JSON.parse(localStorage.getItem('nccu_logs_v36') || '[]');
        document.getElementById('log-list').innerHTML = logs.map(l => `
            <div class="log-item">
                <button class="btn-del-log" onclick="deleteLog(${l.id})">🗑️</button>
                <div style="color:#999; font-size:0.75rem;">${l.date} | ${l.rawTime || ''}</div>
                <strong>${l.name}</strong> - ${l.duration} 分鐘
                <button onclick="editLog(${l.id})" style="font-size:0.6rem; border:none; background:#eee; border-radius:4px; cursor:pointer; margin-left:5px;">📝 編輯</button>
                <div style="color:#666; font-style:italic; margin-top:3px;">${l.note}</div>
            </div>
        `).join('') || '<div style="text-align:center; color:#ccc; padding:10px;">尚無紀錄</div>';
    }

    function init() {
        const container = document.getElementById('container');
        const customPlaces = JSON.parse(localStorage.getItem('nccu_custom_v36') || '[]');
        const allPlaces = [...defaultData, ...customPlaces];
        allPlaces.forEach((item, i) => {
            const card = document.createElement('div');
            card.id = `card-${i}`; card.className = `card`;
            card.innerHTML = `
                <div onclick="this.parentElement.classList.toggle('active')">
                    <div class="card-header"><span class="name">${item.icon || '📍'} ${item.name}</span><span class="status-badge">...</span></div>
                    <div class="info-row">計算中...</div>
                    <div class="today-range">---</div>
                </div>
                <div class="details"><div id="btn-ctx-${i}"></div></div>`;
            container.appendChild(card);
        });
        checkStatus(); renderButtons(); renderLogs(); updateStats();
        setInterval(checkStatus, 30000);
    }
    init();
</script>
</body>
</html>
